input {
    tcp {
        port => 5044
        codec => json_lines
    }
}

filter {
  mutate {
    add_field => { "application" => "spring-boot-app" }
  }
}

output {
    elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "spring-boot-logs-%{+YYYY.MM.dd}"
    }
    stdout {
        codec => rubydebug
    }
}